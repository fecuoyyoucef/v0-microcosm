<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Neural-cell silhouette (white on transparent) — Android renders alpha only -->
  <g fill="white" stroke="white" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer ring -->
    <circle cx="48" cy="48" r="26" fill="none" stroke-width="6"/>

    <!-- 12 dendrites radiating outward -->
    <g stroke-width="5" fill="none">
      <line x1="48" y1="6"  x2="48" y2="18"/>
      <line x1="48" y1="78" x2="48" y2="90"/>
      <line x1="6"  y1="48" x2="18" y2="48"/>
      <line x1="78" y1="48" x2="90" y2="48"/>
      <line x1="18" y1="18" x2="27" y2="27"/>
      <line x1="78" y1="18" x2="69" y2="27"/>
      <line x1="18" y1="78" x2="27" y2="69"/>
      <line x1="78" y1="78" x2="69" y2="69"/>
      <line x1="32" y1="10" x2="36" y2="20"/>
      <line x1="64" y1="10" x2="60" y2="20"/>
      <line x1="32" y1="86" x2="36" y2="76"/>
      <line x1="64" y1="86" x2="60" y2="76"/>
    </g>

    <!-- Center dot cluster (flower of 7 dots) -->
    <circle cx="48" cy="48" r="3.2" stroke="none"/>
    <circle cx="48" cy="40" r="2.6" stroke="none"/>
    <circle cx="48" cy="56" r="2.6" stroke="none"/>
    <circle cx="41" cy="44" r="2.6" stroke="none"/>
    <circle cx="55" cy="44" r="2.6" stroke="none"/>
    <circle cx="41" cy="52" r="2.6" stroke="none"/>
    <circle cx="55" cy="52" r="2.6" stroke="none"/>
  </g>
</svg>
