<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!--
    Android / Chrome notification badge.
    Must be solid white on a fully transparent background:
    the OS uses ONLY the alpha channel and tints it with the system color.
    Any colored or opaque pixel becomes a solid white square.
  -->
  <g fill="#ffffff" stroke="none">
    <!-- Central node -->
    <circle cx="48" cy="48" r="10"/>

    <!-- 8 radiating dendrite branches (synapse / neural mesh) -->
    <!-- top -->
    <path d="M48 36 L48 14 M48 20 L42 12 M48 20 L54 12 M48 26 L40 22 M48 26 L56 22"
          stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- bottom -->
    <path d="M48 60 L48 82 M48 76 L42 84 M48 76 L54 84 M48 70 L40 74 M48 70 L56 74"
          stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- left -->
    <path d="M36 48 L14 48 M20 48 L12 42 M20 48 L12 54 M26 48 L22 40 M26 48 L22 56"
          stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- right -->
    <path d="M60 48 L82 48 M76 48 L84 42 M76 48 L84 54 M70 48 L74 40 M70 48 L74 56"
          stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none"/>

    <!-- 4 diagonal dendrites -->
    <path d="M40 40 L24 24 M30 30 L22 30 M30 30 L30 22"
          stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M56 40 L72 24 M66 30 L74 30 M66 30 L66 22"
          stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M40 56 L24 72 M30 66 L22 66 M30 66 L30 74"
          stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M56 56 L72 72 M66 66 L74 66 M66 66 L66 74"
          stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none"/>
  </g>
</svg>
