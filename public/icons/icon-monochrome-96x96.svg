<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Synaptic Spaces monochrome badge - neural network pattern -->
  <circle cx="48" cy="48" r="28" fill="none" stroke="white" stroke-width="2"/>
  <!-- Inner neural pattern -->
  <circle cx="48" cy="48" r="12" fill="none" stroke="white" stroke-width="1.5"/>
  <circle cx="48" cy="48" r="6" fill="white"/>
  <!-- Neural connections radiating out -->
  <line x1="48" y1="20" x2="48" y2="36" stroke="white" stroke-width="1.5"/>
  <line x1="48" y1="60" x2="48" y2="76" stroke="white" stroke-width="1.5"/>
  <line x1="20" y1="48" x2="36" y2="48" stroke="white" stroke-width="1.5"/>
  <line x1="60" y1="48" x2="76" y2="48" stroke="white" stroke-width="1.5"/>
  <!-- Diagonal connections -->
  <line x1="28" y1="28" x2="38" y2="38" stroke="white" stroke-width="1.2"/>
  <line x1="58" y1="58" x2="68" y2="68" stroke="white" stroke-width="1.2"/>
  <line x1="68" y1="28" x2="58" y2="38" stroke="white" stroke-width="1.2"/>
  <line x1="38" y1="58" x2="28" y2="68" stroke="white" stroke-width="1.2"/>
  <!-- Small outer nodes -->
  <circle cx="48" cy="20" r="3" fill="white"/>
  <circle cx="48" cy="76" r="3" fill="white"/>
  <circle cx="20" cy="48" r="3" fill="white"/>
  <circle cx="76" cy="48" r="3" fill="white"/>
  <circle cx="28" cy="28" r="2.5" fill="white"/>
  <circle cx="68" cy="28" r="2.5" fill="white"/>
  <circle cx="28" cy="68" r="2.5" fill="white"/>
  <circle cx="68" cy="68" r="2.5" fill="white"/>
</svg>
