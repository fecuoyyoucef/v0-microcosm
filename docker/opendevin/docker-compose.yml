version: '3.8'

services:
  opendevin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opendevin-api
    ports:
      - "8080:8080"
    environment:
      - HF_TOKEN1=${HF_TOKEN1}
      - HF_TOKEN2=${HF_TOKEN2}
      - HF_TOKEN3=${HF_TOKEN3}
      - HF_API_BASE=https://api-inference.huggingface.co/models
      - OPENDEVIN_API_HOST=0.0.0.0
      - OPENDEVIN_API_PORT=8080
      - PYTHONUNBUFFERED=1
    volumes:
      - ./workspace:/workspace
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - opendevin-network

networks:
  opendevin-network:
    driver: bridge
